<style>
  :root{
    --ink:#1c1f3d;
    --ink-soft:#3a3f6b;
    --paper:#fbf6ec;
    --paper-dim:#f1ead9;
    --coral:#ff6659;
    --gold:#efb13c;
    --teal:#2c7a76;
    --line: rgba(28,31,61,0.14);
    --shadow: 0 18px 40px rgba(28,31,61,0.35);
    --font-display: 'Fraunces', Georgia, serif;
    --font-body: 'Sora', 'Inter', system-ui, sans-serif;
    --font-mono: 'IBM Plex Mono', 'Courier New', monospace;
  }

  * { box-sizing: border-box; }

  #pp-root{
    font-family: var(--font-body);
    background: var(--ink);
    background-image:
      radial-gradient(circle at 15% 10%, rgba(255,102,89,0.18), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(44,122,118,0.25), transparent 45%);
    color: var(--paper);
    padding: 28px 16px 60px;
    border-radius: 18px;
    min-height: 100%;
  }
  #pp-root.pp-shared-mode{ padding: 0; border-radius: 0; background: var(--paper); }

  .pp-wrap{ max-width: 760px; margin: 0 auto; }

  .pp-eyebrow{
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .pp-eyebrow::before{ content:""; width: 22px; height: 1px; background: var(--gold); display: inline-block; }

  h1.pp-title{
    font-family: var(--font-display);
    font-weight: 600;
    font-size: clamp(32px, 6vw, 48px);
    line-height: 1.02;
    margin: 0 0 8px;
    letter-spacing: -0.01em;
  }
  h1.pp-title em{ font-style: italic; color: var(--coral); }

  .pp-sub{ font-size: 15px; color: rgba(251,246,236,0.72); max-width: 50ch; line-height: 1.5; margin: 0 0 22px; }

  /* ---- Card (invitation) ---- */
  .pp-card{ background: var(--paper); color: var(--ink); border-radius: 14px; box-shadow: var(--shadow); padding: 30px; position: relative; overflow: hidden; }
  .pp-card::before{ content:""; position:absolute; inset: 8px; border: 1px dashed rgba(28,31,61,0.18); border-radius: 8px; pointer-events: none; }

  .pp-field{ margin-bottom: 20px; }
  .pp-field label{ display:block; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 8px; }
  .pp-row{ display:grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 480px){ .pp-row{ grid-template-columns: 1fr; } }

  .pp-field input[type=text], .pp-field input[type=number], .pp-field select, .pp-field textarea{
    width: 100%; font-family: var(--font-body); font-size: 15px; padding: 11px 13px;
    border-radius: 8px; border: 1.5px solid var(--line); background: #fff; color: var(--ink); outline-offset: 2px;
  }
  .pp-field input:focus-visible, .pp-field select:focus-visible, .pp-field textarea:focus-visible{ outline: 2px solid var(--teal); }
  .pp-field textarea{ resize: vertical; min-height: 64px; font-family: var(--font-body); }

  .pp-chip-group{ display:flex; flex-wrap:wrap; gap: 8px; }
  .pp-chip{
    font-family: var(--font-mono); font-size: 12.5px; padding: 8px 14px; border-radius: 999px;
    border: 1.5px solid var(--line); background: #fff; cursor: pointer; color: var(--ink-soft); transition: all 0.15s ease;
  }
  .pp-chip:hover{ border-color: var(--coral); }
  .pp-chip.active{ background: var(--ink); border-color: var(--ink); color: var(--paper); }
  .pp-chip:focus-visible{ outline: 2px solid var(--teal); outline-offset: 2px; }

  .pp-submit{
    width: 100%; margin-top: 6px; font-family: var(--font-display); font-size: 18px; font-weight: 600;
    padding: 15px; border-radius: 9px; border: none; background: var(--coral); color: #fff9f5; cursor: pointer;
    box-shadow: 0 8px 18px rgba(255,102,89,0.35); transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  .pp-submit:hover:not(:disabled){ transform: translateY(-1px); box-shadow: 0 10px 22px rgba(255,102,89,0.45); }
  .pp-submit:active:not(:disabled){ transform: translateY(0); }
  .pp-submit:disabled{ opacity: 0.6; cursor: default; }
  .pp-submit:focus-visible{ outline: 2px solid var(--ink); outline-offset: 3px; }

  .pp-error{ margin-top: 14px; font-size: 13.5px; color: #9c2b23; background: #fbe3e0; border: 1px solid #f0b7b0; padding: 10px 13px; border-radius: 8px; }

  .pp-loading{ display:flex; align-items:center; gap: 12px; font-family: var(--font-mono); font-size: 13px; color: var(--paper); margin-top: 22px; }
  .pp-spinner{ width: 16px; height:16px; border-radius: 50%; border: 2px solid rgba(251,246,236,0.25); border-top-color: var(--gold); animation: pp-spin 0.8s linear infinite; }
  @keyframes pp-spin{ to{ transform: rotate(360deg); } }

  .pp-result{ animation: pp-rise 0.5s cubic-bezier(.2,.8,.2,1) both; }
  @keyframes pp-rise{ from{ opacity:0; transform: translateY(14px); } to{ opacity:1; transform: translateY(0); } }

  .pp-seal{
    width: 84px; height: 84px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #ff8577, var(--coral) 70%, #d9483c 100%);
    display:flex; align-items:center; justify-content:center; margin: 0 auto 18px;
    box-shadow: 0 10px 24px rgba(255,102,89,0.4), inset 0 -4px 8px rgba(0,0,0,0.15); position: relative;
  }
  .pp-seal::after{ content:""; position:absolute; inset: -6px; border-radius: 50%; border: 1.5px dashed rgba(251,246,236,0.4); }
  .pp-seal svg{ width: 40px; height:40px; }

  .pp-result-head{ text-align:center; margin-bottom: 30px; padding-top: 26px; }
  .pp-result-eyebrow{ font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
  .pp-theme-name{ font-family: var(--font-display); font-size: clamp(26px, 5vw, 36px); font-style: italic; color: var(--paper); margin: 0 0 10px; }
  .pp-theme-desc{ color: rgba(251,246,236,0.78); max-width: 52ch; margin: 0 auto; line-height: 1.55; font-size: 14.5px; }

  .pp-palette{ display:flex; justify-content:center; gap:8px; margin-top: 16px; }
  .pp-swatch{ width: 26px; height: 26px; border-radius: 50%; border: 2px solid rgba(251,246,236,0.5); }

  .pp-ticket{ background: var(--paper); color: var(--ink); border-radius: 12px; margin-bottom: 18px; box-shadow: var(--shadow); overflow: hidden; }
  .pp-ticket-head{ display:flex; align-items:center; gap: 10px; padding: 16px 20px; border-bottom: 1px dashed var(--line); background: var(--paper-dim); }
  .pp-ticket-num{ font-family: var(--font-mono); font-size: 11px; color: var(--paper); background: var(--teal); width: 24px; height: 24px; border-radius: 50%; display:flex; align-items:center; justify-content:center; flex-shrink: 0; }
  .pp-ticket-title{ font-family: var(--font-display); font-weight: 600; font-size: 17px; }
  .pp-ticket-body{ padding: 16px 20px 20px; }

  .pp-list{ list-style:none; margin:0; padding:0; }
  .pp-list li{ padding: 8px 0; border-bottom: 1px solid rgba(28,31,61,0.08); font-size: 14px; line-height: 1.5; display:flex; gap: 10px; }
  .pp-list li:last-child{ border-bottom:none; }
  .pp-list li::before{ content:"–"; color: var(--coral); flex-shrink:0; }

  .pp-timeline-item{ display:flex; gap: 14px; padding: 10px 0; border-bottom: 1px solid rgba(28,31,61,0.08); }
  .pp-timeline-item:last-child{ border-bottom:none; }
  .pp-timeline-time{ font-family: var(--font-mono); font-size: 12px; color: var(--teal); min-width: 68px; padding-top: 1px; }
  .pp-timeline-text{ font-size: 14px; line-height: 1.5; }

  .pp-budget-row{ display:flex; justify-content:space-between; padding: 8px 0; border-bottom: 1px solid rgba(28,31,61,0.08); font-size: 14px; }
  .pp-budget-row:last-child{ border-bottom:none; }
  .pp-budget-row span:last-child{ font-family: var(--font-mono); color: var(--ink-soft); }
  .pp-budget-total{ display:flex; justify-content:space-between; padding-top: 12px; margin-top: 4px; border-top: 1.5px solid var(--ink); font-family: var(--font-display); font-weight: 600; font-size: 16px; }

  .pp-action-row{ display:flex; gap: 10px; flex-wrap: wrap; justify-content:center; margin-top: 8px; }
  .pp-again, .pp-site-btn{
    background: none; font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.08em;
    padding: 10px 20px; border-radius: 999px; cursor: pointer;
  }
  .pp-again{ border: 1px solid rgba(251,246,236,0.4); color: var(--paper); }
  .pp-again:hover{ border-color: var(--gold); color: var(--gold); }
  .pp-site-btn{ border: 1px solid var(--coral); color: var(--paper); background: var(--coral); }
  .pp-site-btn:hover{ background: #ff7c70; }

  /* ---- Site builder ---- */
  .pp-site-panel{
    margin-top: 28px; background: var(--paper); color: var(--ink);
    border-radius: 14px; box-shadow: var(--shadow); padding: 26px;
  }
  .pp-site-panel h3{ font-family: var(--font-display); font-size: 20px; margin: 0 0 4px; }
  .pp-site-panel .pp-site-lede{ font-size: 13px; color: var(--ink-soft); margin: 0 0 20px; line-height:1.5; }
  .pp-site-block{ margin-bottom: 18px; }
  .pp-site-block label{ display:block; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 8px; }
  .pp-site-block input[type=text], .pp-site-block textarea{
    width:100%; font-family: var(--font-body); font-size: 14.5px; padding: 10px 12px;
    border-radius: 8px; border: 1.5px solid var(--line); background:#fff; color: var(--ink);
  }
  .pp-site-block textarea{ min-height: 54px; resize: vertical; }
  .pp-template-row{ display:flex; gap: 8px; flex-wrap: wrap; }
  .pp-template-chip{
    font-family: var(--font-mono); font-size: 12px; padding: 9px 14px; border-radius: 8px;
    border: 1.5px solid var(--line); background:#fff; cursor:pointer; color: var(--ink-soft);
  }
  .pp-template-chip.active{ background: var(--ink); border-color: var(--ink); color: var(--paper); }
  .pp-color-row{ display:flex; align-items:center; gap: 10px; flex-wrap: wrap; }
  .pp-color-swatch{ width: 30px; height: 30px; border-radius: 50%; border: 2px solid transparent; cursor:pointer; }
  .pp-color-swatch.active{ border-color: var(--ink); }
  .pp-color-custom{ width: 34px; height: 34px; border: none; padding:0; background:none; cursor:pointer; }
  .pp-section-toggles{ display:flex; gap:8px; flex-wrap:wrap; }

  .pp-ai-block{
    background: var(--paper-dim); border: 1.5px dashed var(--coral);
    border-radius: 10px; padding: 16px 18px; margin-bottom: 22px;
  }
  .pp-ai-block label{ display:block; font-family: var(--font-display); font-size: 15px; font-weight:600; color: var(--ink); margin-bottom: 8px; text-transform:none; letter-spacing:0; }
  .pp-ai-block textarea{
    width:100%; font-family: var(--font-body); font-size: 13.5px; padding: 9px 11px;
    border-radius: 7px; border: 1.5px solid var(--line); background:#fff; color: var(--ink); min-height:44px; resize:vertical;
  }
  .pp-ai-row{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-top: 10px; }
  .pp-ai-status{ margin-top: 10px; font-size: 12.5px; color: var(--ink-soft); line-height:1.5; }
  .pp-ai-status.pp-ai-error{ color: #9c2b23; }
  .pp-divider{ text-align:center; font-family: var(--font-mono); font-size: 11px; letter-spacing:.15em; text-transform:uppercase; color: var(--ink-soft); margin: 6px 0 18px; }
  .pp-keys-toggle{ background:none; border:none; color: var(--ink-soft); font-family: var(--font-mono); font-size: 11.5px; text-decoration: underline; cursor:pointer; padding: 0; }
  .pp-keys-toggle:hover{ color: var(--coral); }
  .pp-keys-panel{ margin-top: 12px; }
  .pp-keys-note{ font-size: 12px; color: var(--ink-soft); line-height: 1.5; margin: 0 0 10px; }
  .pp-key-row{ display:grid; grid-template-columns: 60px 1fr; gap: 8px; align-items:center; }
  .pp-key-row label{ font-family: var(--font-mono); font-size: 11px; color: var(--ink-soft); text-transform:none; margin:0; }
  .pp-key-row input{ width:100%; font-family: var(--font-body); font-size: 13px; padding: 8px 10px; border-radius: 6px; border: 1.5px solid var(--line); background:#fff; color: var(--ink); }

  .pp-raw-check{ display:flex; align-items:center; gap:8px; font-family: var(--font-mono); font-size: 12px; color: var(--ink-soft); margin-bottom: 10px; cursor:pointer; }
  .pp-raw-textarea{ width:100%; min-height: 220px; font-family: var(--font-mono); font-size: 11.5px; padding: 12px; border-radius:8px; border: 1.5px solid var(--line); }
  .pp-preview-frame{ width:100%; height: 480px; border: 1.5px solid var(--line); border-radius: 12px; background:#fff; margin-top: 4px; }
  .pp-site-actions{ display:flex; gap:10px; flex-wrap:wrap; margin-top: 18px; }
  .pp-btn-secondary{
    font-family: var(--font-mono); font-size: 12.5px; padding: 11px 18px; border-radius: 8px;
    border: 1.5px solid var(--ink); background: #fff; color: var(--ink); cursor:pointer;
  }
  .pp-btn-secondary:hover{ background: var(--paper-dim); }
  .pp-btn-primary{
    font-family: var(--font-mono); font-size: 12.5px; padding: 11px 18px; border-radius: 8px;
    border: none; background: var(--ink); color: var(--paper); cursor:pointer;
  }
  .pp-btn-primary:hover{ background: #2a2e57; }
  .pp-share-row{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-top: 10px; }
  .pp-share-row input[type=text]{ flex:1; min-width: 160px; font-family: var(--font-mono); font-size: 13px; padding: 9px 11px; border-radius: 7px; border: 1.5px solid var(--line); }
  .pp-share-link-box{ margin-top: 12px; background: var(--paper-dim); border: 1px dashed var(--line); border-radius: 8px; padding: 12px 14px; font-family: var(--font-mono); font-size: 12.5px; word-break: break-all; }
  .pp-share-note{ font-size: 12px; color: var(--ink-soft); margin-top: 8px; line-height: 1.5; }
  .pp-share-warn{ font-size: 12.5px; color: #9c6b1f; margin-top: 8px; }

  /* ---- Shared site chrome ---- */
  .pp-shared-bar{
    display:flex; align-items:center; justify-content:space-between;
    padding: 10px 18px; background: var(--ink); color: rgba(251,246,236,0.75);
    font-family: var(--font-mono); font-size: 11.5px;
  }
  .pp-shared-bar a{ color: var(--gold); text-decoration:none; }
  .pp-shared-bar a:hover{ text-decoration: underline; }
  .pp-shared-frame{ width:100%; height: 88vh; min-height: 600px; border:none; display:block; }
  .pp-shared-status{ padding: 60px 20px; text-align:center; font-family: var(--font-body); color: var(--ink); }
</style>

<div id="pp-root">
  <div class="pp-wrap" id="pp-planner-wrap">
    <div class="pp-eyebrow">Party Planner</div>
    <h1 class="pp-title">Plan a party<br/><em>worth the confetti.</em></h1>
    <p class="pp-sub">Answer a few questions. Get a theme, a menu, a timeline, and a shopping list — generated instantly, right in your browser. No account, no API key, works offline.</p>

    <div class="pp-card" id="pp-form-card">
      <div class="pp-field">
        <label for="pp-occasion">What's the occasion?</label>
        <input type="text" id="pp-occasion" placeholder="e.g. 30th birthday, baby shower, retirement" />
      </div>
      <div class="pp-row">
        <div class="pp-field">
          <label for="pp-guests">How many guests?</label>
          <input type="number" id="pp-guests" placeholder="e.g. 20" min="1" />
        </div>
        <div class="pp-field">
          <label for="pp-budget">Budget (total)</label>
          <input type="text" id="pp-budget" placeholder="e.g. $300" />
        </div>
      </div>
      <div class="pp-field">
        <label>Where's it happening?</label>
        <div class="pp-chip-group" id="pp-location-chips">
          <button type="button" class="pp-chip" data-value="Backyard / outdoor">Backyard / outdoor</button>
          <button type="button" class="pp-chip" data-value="Home / indoor">Home / indoor</button>
          <button type="button" class="pp-chip" data-value="Rented venue">Rented venue</button>
          <button type="button" class="pp-chip" data-value="Restaurant or bar">Restaurant or bar</button>
        </div>
      </div>
      <div class="pp-field">
        <label>Set the vibe (pick a few)</label>
        <div class="pp-chip-group" id="pp-vibe-chips">
          <button type="button" class="pp-chip" data-value="Elegant">Elegant</button>
          <button type="button" class="pp-chip" data-value="Laid-back">Laid-back</button>
          <button type="button" class="pp-chip" data-value="Bold & colorful">Bold & colorful</button>
          <button type="button" class="pp-chip" data-value="Cozy">Cozy</button>
          <button type="button" class="pp-chip" data-value="Retro">Retro</button>
          <button type="button" class="pp-chip" data-value="Kid-friendly">Kid-friendly</button>
          <button type="button" class="pp-chip" data-value="Late-night">Late-night</button>
        </div>
      </div>
      <div class="pp-field">
        <label for="pp-notes">Anything else to work around?</label>
        <textarea id="pp-notes" placeholder="Dietary needs, must-have songs, a color you love, a mascot you hate..."></textarea>
      </div>
      <button class="pp-submit" id="pp-submit">Draft my party plan</button>
      <div id="pp-error-slot"></div>
      <div id="pp-loading-slot"></div>
    </div>

    <div id="pp-result-slot"></div>
    <div id="pp-site-slot"></div>
  </div>
</div>

<script>
(function(){
  function showFatalError(msg){
    const root = document.getElementById('pp-root');
    if(!root) return;
    let bar = document.getElementById('pp-fatal-error');
    if(!bar){
      bar = document.createElement('div');
      bar.id = 'pp-fatal-error';
      bar.style.cssText = 'background:#fbe3e0;color:#9c2b23;font-family:monospace;font-size:12px;padding:12px 16px;border-radius:8px;margin-bottom:16px;max-width:760px;';
      root.prepend(bar);
    }
    bar.textContent = 'Something broke: ' + msg;
  }
  window.addEventListener('error', (e) => showFatalError(e.message || 'unknown error'));
  window.addEventListener('unhandledrejection', (e) => showFatalError((e.reason && e.reason.message) || String(e.reason)));

  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str == null ? '' : String(str);
    return d.innerHTML;
  }
  function slugify(s){
    return (s||'').toLowerCase().trim().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'').slice(0,40) || 'party';
  }

  /* ================= LOCAL PLAN GENERATOR (no API, no network) ================= */

  function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
  function pickN(arr, n){
    const pool = arr.slice();
    const out = [];
    while(pool.length && out.length < n){
      out.push(pool.splice(Math.floor(Math.random()*pool.length), 1)[0]);
    }
    return out;
  }

  const VIBE_WORDS = {
    'Elegant': { adj:['Gilded','Velvet','Moonlit','Champagne','Ivory'], noun:['Affair','Soirée','Gala','Evening'] },
    'Laid-back': { adj:['Golden Hour','Backyard','Easy','Sunlit'], noun:['Gathering','Hang','Cookout','Get-Together'] },
    'Bold & colorful': { adj:['Neon','Technicolor','Confetti','Electric'], noun:['Bash','Fiesta','Carnival','Jam'] },
    'Cozy': { adj:['Fireside','Amber','Warm','Flannel'], noun:['Night In','Gathering','Supper','Circle'] },
    'Retro': { adj:['Disco','Rewind','Vintage','Neon Retro'], noun:['Throwback','Groove','Revival','Reunion'] },
    'Kid-friendly': { adj:['Sprinkle','Rainbow','Bubblegum','Wonderland'], noun:['Party','Carnival','Adventure','Jamboree'] },
    'Late-night': { adj:['Midnight','After-Hours','Starlit','Neon Night'], noun:['Session','Affair','Rendezvous','Takeover'] },
  };
  const DEFAULT_WORDS = { adj:['Golden','Bright','Joyful','Radiant'], noun:['Celebration','Gathering'] };

  const PALETTES = {
    'Elegant': ['#1c1f3d','#efb13c','#fbf6ec','#6b4e8e','#2c7a76'],
    'Laid-back': ['#e8b04b','#7c9473','#fbf6ec','#d97757','#3a3f6b'],
    'Bold & colorful': ['#ff6659','#efb13c','#2c7a76','#6b4e8e','#1c1f3d'],
    'Cozy': ['#8a5a3b','#d9a679','#5c3d2e','#efb13c','#fbf6ec'],
    'Retro': ['#ff6659','#2c7a76','#efb13c','#6b4e8e','#1c1f3d'],
    'Kid-friendly': ['#ff8fa3','#ffd166','#06d6a0','#118ab2','#fbf6ec'],
    'Late-night': ['#1c1f3d','#6b4e8e','#ff6659','#efb13c','#0d0f1f'],
    'default': ['#ff6659','#efb13c','#2c7a76','#1c1f3d','#fbf6ec'],
  };

  const BITES = {
    'Elegant': ['Whipped goat cheese crostini','Prosciutto-wrapped melon skewers','Smoked salmon blinis','Marcona almonds & marinated olives'],
    'Laid-back': ['Loaded nacho bar','Pulled pork sliders','Chips, guac & salsa trio','Grilled corn elotes'],
    'Bold & colorful': ['Rainbow veggie platter with dips','Build-your-own taco bar','Popcorn bar with mix-in toppings','Mini corn dogs'],
    'Cozy': ['Baked brie with honey & walnuts','Slow-cooker meatballs','Loaded baked potato bar','Warm spinach-artichoke dip'],
    'Retro': ['Deviled eggs','Pigs in a blanket','Cheese ball & crackers','Chex mix'],
    'Kid-friendly': ['Mini pizza bagels','Fruit kabobs','Cheese & cracker skewers','DIY trail mix bar'],
    'Late-night': ['Loaded fries station','Slider bar','Spicy wings','Warm pretzel bites'],
    'default': ['Assorted finger foods','Fresh vegetable platter with dip','Cheese & charcuterie board','Mixed nuts & olives'],
  };

  function detectOccasionKey(occasionLower){
    const keys = Object.keys(OCCASION_ACTIVITIES).filter(k => k !== 'default');
    for(const k of keys){ if(occasionLower.includes(k)) return k; }
    if(occasionLower.includes('birthday') || /\b\d{1,3}(st|nd|rd|th)\b/.test(occasionLower)) return 'birthday';
    return 'default';
  }

  function detectDietaryNote(notesLower){
    const tags = [];
    if(notesLower.includes('vegan')) tags.push('vegan-friendly option at every station');
    if(notesLower.includes('vegetarian')) tags.push('vegetarian option at every station');
    if(notesLower.includes('gluten')) tags.push('gluten-free option clearly labeled');
    if(notesLower.includes('nut')) tags.push('nut-free prep for shared dishes');
    if(notesLower.includes('dairy')) tags.push('dairy-free option available');
    if(notesLower.includes('halal')) tags.push('halal option available');
    if(notesLower.includes('kosher')) tags.push('kosher option available');
    return tags;
  }

  function buildLocalPlan({ occasion, guests, budget, notes, location, vibes }){
    const occasionLower = occasion.toLowerCase();
    const notesLower = notes.toLowerCase();
    const primaryVibe = vibes[0] || null;
    const words = VIBE_WORDS[primaryVibe] || DEFAULT_WORDS;
    const occasionKey = detectOccasionKey(occasionLower);
    const guestsNum = parseInt(guests, 10);

    const themeName = `${pick(words.adj)} ${pick(words.noun)}`;
    const guestPhrase = guestsNum ? `${guestsNum} guests` : 'your guests';
    const vibePhrase = vibes.length ? vibes.join(' meets ').toLowerCase() : 'warm and welcoming';
    const locPhrase = location ? location.toLowerCase() : 'wherever you\'re hosting';
    const themeDescription = `A ${vibePhrase} take on ${occasion.toLowerCase()}, built for ${guestPhrase} ${locPhrase.startsWith('backyard') || locPhrase.startsWith('home') ? 'at ' + locPhrase : 'at your ' + locPhrase}.`;

    const palette = PALETTES[primaryVibe] || PALETTES['default'];

    const dietaryTags = detectDietaryNote(notesLower);
    const bites = pickN(BITES[primaryVibe] || BITES['default'], 4);
    const drinks = pickN(DRINKS[primaryVibe] || DRINKS['default'], 3);
    const sweets = pickN(SWEETS[primaryVibe] || SWEETS['default'], 2);
    if(dietaryTags.length){ bites.push('Every station includes a ' + dietaryTags.join(' and ')); }

    const menu = [
      { category: 'Bites', items: bites },
      { category: 'Drinks', items: drinks },
      { category: 'Sweets', items: sweets },
    ];

    const decor = pickN(DECOR[primaryVibe] || DECOR['default'], 4);

    const activityPool = (OCCASION_ACTIVITIES[occasionKey] || OCCASION_ACTIVITIES['default'])
      .concat(vibes.flatMap(v => VIBE_ACTIVITIES[v] || []));
    const activities = pickN(activityPool, Math.min(4, activityPool.length));

    const centerpieceMoment = activities[0] || 'A group toast';
    const secondActivity = activities[1] || 'Open mingling time';
    const timeline = [
      { time: 'Arrival', event: 'Guests arrive — drinks and bites are out, welcome music is playing' },
      { time: '+20 min', event: 'Everyone\'s settled in — kick things off with ' + centerpieceMoment.toLowerCase() },
      { time: '+45 min', event: 'Main food stations open' },
      { time: '+1 hr 15 min', event: secondActivity },
      { time: '+1 hr 45 min', event: 'Dessert & sweets table opens' },
      { time: '+2 hr 15 min', event: 'Music shifts to a wind-down playlist, thank-yous begin' },
    ];

    const shopping = [
      'Plates, napkins & cups' + (guestsNum ? ` (for ${guestsNum})` : ''),
      'Serving trays & utensils',
      'Tablecloths',
      'Ice & a cooler',
      'Trash bags & a spare bin',
      'String lights or candles',
      ...decor.slice(0,2).map(d => d.split(' — ')[0]),
      ...bites.slice(0,2),
      ...drinks.slice(0,1),
      sweets[0] || 'Celebration cake',
    ].filter((v,i,arr) => arr.indexOf(v) === i).slice(0, 12);

    let budgetBreakdown = [];
    let budgetTotal = budget || '';
    const budgetNum = budget ? parseFloat(budget.replace(/[^0-9.]/g, '')) : NaN;
    if(!isNaN(budgetNum) && budgetNum > 0){
      const splits = [
        { item: 'Food & drink', pct: 0.40 },
        { item: 'Decor', pct: 0.20 },
        { item: 'Activities & entertainment', pct: 0.15 },
        { item: 'Rentals & supplies', pct: 0.15 },
        { item: 'Buffer / misc', pct: 0.10 },
      ];
      budgetBreakdown = splits.map(s => ({ item: s.item, estimate: '$' + Math.round(budgetNum * s.pct) }));
      budgetTotal = '$' + Math.round(budgetNum);
    } else {
      budgetBreakdown = [
        { item: 'Food & drink', estimate: '~40%' },
        { item: 'Decor', estimate: '~20%' },
        { item: 'Activities & entertainment', estimate: '~15%' },
        { item: 'Rentals & supplies', estimate: '~15%' },
        { item: 'Buffer / misc', estimate: '~10%' },
      ];
      budgetTotal = 'Set a number above for exact dollar amounts';
    }

    return {
      theme_name: themeName,
      theme_description: themeDescription,
      color_palette: palette,
      menu,
      decor,
      activities,
      timeline,
      shopping_list: shopping,
      budget_breakdown: budgetBreakdown,
      budget_total: budgetTotal,
    };
  }

  function generateSiteDocument(config, plan){
    const accent = config.accent || '#ff6659';
    const template = config.template || 'program';
    const title = config.title || (plan && plan.theme_name) || "You're invited";
    const subtitle = config.subtitle || (plan && plan.theme_description) || '';
    const sections = config.sections || {};

    const scheduleHtml = (sections.schedule && plan && plan.timeline && plan.timeline.length) ? `
      <section class="site-section"><h2>Schedule</h2>
        ${plan.timeline.map(t=>`<div class="site-row"><span class="site-time">${escapeHtml(t.time)}</span><span>${escapeHtml(t.event)}</span></div>`).join('')}
      </section>` : '';

    const menuHtml = (sections.menu && plan && plan.menu && plan.menu.length) ? `
      <section class="site-section"><h2>Food & drink</h2>
        ${plan.menu.map(cat=>`<div style="margin-bottom:10px;"><strong>${escapeHtml(cat.category)}</strong><ul>${(cat.items||[]).map(i=>`<li>${escapeHtml(i)}</li>`).join('')}</ul></div>`).join('')}
      </section>` : '';

    const activitiesHtml = (sections.activities && plan && plan.activities && plan.activities.length) ? `
      <section class="site-section"><h2>Activities</h2><ul>${plan.activities.map(i=>`<li>${escapeHtml(i)}</li>`).join('')}</ul></section>` : '';

    const decorHtml = (sections.decor && plan && plan.decor && plan.decor.length) ? `
      <section class="site-section"><h2>What to expect</h2><ul>${plan.decor.map(i=>`<li>${escapeHtml(i)}</li>`).join('')}</ul></section>` : '';

    const infoBits = [config.eventLine, config.locationLine].filter(Boolean).map(x=>`<div class="site-info-bit">${escapeHtml(x)}</div>`).join('');
    const rsvpHtml = config.hostNote ? `<section class="site-section"><h2>RSVP</h2><p>${escapeHtml(config.hostNote)}</p></section>` : '';
    const homeUrl = config.homeUrl || '#';

    const body = `
      <header class="site-hero">
        <p class="site-eyebrow">You're invited</p>
        <h1>${escapeHtml(title)}</h1>
        ${subtitle ? `<p class="site-subtitle">${escapeHtml(subtitle)}</p>` : ''}
        ${infoBits ? `<div class="site-info">${infoBits}</div>` : ''}
      </header>
      <main>${scheduleHtml}${menuHtml}${activitiesHtml}${decorHtml}${rsvpHtml}</main>
      <footer class="site-footer">Made with Party Planner · <a href="${escapeHtml(homeUrl)}" target="_top">make your own</a></footer>
    `;

    return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${escapeHtml(title)}</title>
<style>${siteTemplateCss(template, accent)}</style>
</head>
<body>
${body}
</body>
</html>`;
  }

  /* ================= SHARED VIEW (when opened via #event=code) ================= */

  async function renderSharedSite(code){
    const root = document.getElementById('pp-root');
    root.classList.add('pp-shared-mode');
    root.innerHTML = `<div class="pp-shared-status">Loading party page…</div>`;
    const homeUrl = location.origin + location.pathname + location.search;
    try {
      const result = await window.storage.get('event:' + code, true);
      if(!result){ throw new Error('not found'); }
      const config = JSON.parse(result.value);
      config.homeUrl = homeUrl;
      const doc = config.rawHtml && config.rawHtml.trim() ? config.rawHtml : generateSiteDocument(config, config.plan);
      root.innerHTML = `
        <div class="pp-shared-bar"><span>Party Planner page</span><a href="${homeUrl}" target="_top">make your own →</a></div>
        <iframe class="pp-shared-frame" id="pp-shared-frame" sandbox="allow-same-origin"></iframe>
      `;
      document.getElementById('pp-shared-frame').srcdoc = doc;
    } catch(err){
      root.innerHTML = `
        <div class="pp-shared-bar"><span>Party Planner page</span><a href="${homeUrl}" target="_top">make your own →</a></div>
        <div class="pp-shared-status">This party page couldn't be found. The link may be mistyped, or the page may not have been shared from a published version of this tool yet.</div>
      `;
    }
  }

  function initPlanner(){
    const locationChips = document.querySelectorAll('#pp-location-chips .pp-chip');
    const vibeChips = document.querySelectorAll('#pp-vibe-chips .pp-chip');
    locationChips.forEach(chip => chip.addEventListener('click', () => {
      locationChips.forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
    }));
    vibeChips.forEach(chip => chip.addEventListener('click', () => chip.classList.toggle('active')));

    const submitBtn = document.getElementById('pp-submit');
    const errorSlot = document.getElementById('pp-error-slot');
    const loadingSlot = document.getElementById('pp-loading-slot');
    const resultSlot = document.getElementById('pp-result-slot');
    const siteSlot = document.getElementById('pp-site-slot');

    const loadingMessages = ['Sketching a theme...', 'Setting the menu...', 'Building the timeline...', 'Wrapping up the shopping list...'];
    function setLoading(isLoading){
      submitBtn.disabled = isLoading;
      if(isLoading){
        let i = 0;
        loadingSlot.innerHTML = `<div class="pp-loading"><span class="pp-spinner"></span><span id="pp-loading-text">${loadingMessages[0]}</span></div>`;
        loadingSlot._interval = setInterval(() => {
          i = (i+1) % loadingMessages.length;
          const t = document.getElementById('pp-loading-text');
          if(t) t.textContent = loadingMessages[i];
        }, 1600);
      } else {
        clearInterval(loadingSlot._interval);
        loadingSlot.innerHTML = '';
      }
    }
    function showError(msg){ errorSlot.innerHTML = `<div class="pp-error">${msg}</div>`; }
    function clearError(){ errorSlot.innerHTML = ''; }

    function planHtml(plan){
      const palette = (plan.color_palette || []).map(hex =>
        `<div class="pp-swatch" style="background:${escapeHtml(hex)}" title="${escapeHtml(hex)}"></div>`).join('');
      const menuSections = (plan.menu || []).map((cat, idx) => `
        <div class="pp-ticket"><div class="pp-ticket-head"><span class="pp-ticket-num">${idx+1}</span><span class="pp-ticket-title">${escapeHtml(cat.category)}</span></div>
        <div class="pp-ticket-body"><ul class="pp-list">${(cat.items||[]).map(i => `<li>${escapeHtml(i)}</li>`).join('')}</ul></div></div>`).join('');
      const decor = `<div class="pp-ticket"><div class="pp-ticket-head"><span class="pp-ticket-num">D</span><span class="pp-ticket-title">Decor & atmosphere</span></div><div class="pp-ticket-body"><ul class="pp-list">${(plan.decor||[]).map(i => `<li>${escapeHtml(i)}</li>`).join('')}</ul></div></div>`;
      const activities = `<div class="pp-ticket"><div class="pp-ticket-head"><span class="pp-ticket-num">A</span><span class="pp-ticket-title">Activities & games</span></div><div class="pp-ticket-body"><ul class="pp-list">${(plan.activities||[]).map(i => `<li>${escapeHtml(i)}</li>`).join('')}</ul></div></div>`;
      const timeline = `<div class="pp-ticket"><div class="pp-ticket-head"><span class="pp-ticket-num">T</span><span class="pp-ticket-title">Timeline</span></div><div class="pp-ticket-body">${(plan.timeline||[]).map(t => `<div class="pp-timeline-item"><span class="pp-timeline-time">${escapeHtml(t.time)}</span><span class="pp-timeline-text">${escapeHtml(t.event)}</span></div>`).join('')}</div></div>`;
      const shopping = `<div class="pp-ticket"><div class="pp-ticket-head"><span class="pp-ticket-num">S</span><span class="pp-ticket-title">Shopping list</span></div><div class="pp-ticket-body"><ul class="pp-list">${(plan.shopping_list||[]).map(i => `<li>${escapeHtml(i)}</li>`).join('')}</ul></div></div>`;
      const budgetRows = (plan.budget_breakdown || []).map(b => `<div class="pp-budget-row"><span>${escapeHtml(b.item)}</span><span>${escapeHtml(b.estimate)}</span></div>`).join('');
      const budget = `<div class="pp-ticket"><div class="pp-ticket-head"><span class="pp-ticket-num">$</span><span class="pp-ticket-title">Budget breakdown</span></div><div class="pp-ticket-body">${budgetRows}${plan.budget_total ? `<div class="pp-budget-total"><span>Total</span><span>${escapeHtml(plan.budget_total)}</span></div>` : ''}</div></div>`;

      return `
        <div class="pp-result">
          <div class="pp-seal"><svg viewBox="0 0 24 24" fill="none" stroke="#fbf6ec" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.4 4.9 5.4.8-3.9 3.8.9 5.4L12 14.3l-4.8 2.6.9-5.4L4.2 7.7l5.4-.8L12 2z"/></svg></div>
          <div class="pp-result-head">
            <div class="pp-result-eyebrow">Your party plan</div>
            <h2 class="pp-theme-name">${escapeHtml(plan.theme_name)}</h2>
            <p class="pp-theme-desc">${escapeHtml(plan.theme_description)}</p>
            <div class="pp-palette">${palette}</div>
          </div>
          ${menuSections}${decor}${activities}${timeline}${shopping}${budget}
          <div class="pp-action-row">
            <button class="pp-again" id="pp-again-btn">Draft another version</button>
            <button class="pp-site-btn" id="pp-site-btn">Turn this into a website →</button>
          </div>
        </div>`;
    }
    function renderPlan(plan){
      resultSlot.innerHTML = planHtml(plan);
      document.getElementById('pp-again-btn').addEventListener('click', () => {
        resultSlot.innerHTML=''; siteSlot.innerHTML='';
        window.scrollTo({top:0, behavior:'smooth'});
      });
      document.getElementById('pp-site-btn').addEventListener('click', () => openSiteBuilder(plan));
    }

    /* ---- Site builder ---- */
    function openSiteBuilder(plan){
      const state = {
        template: 'program',
        accent: '#ff6659',
        title: plan.theme_name || '',
        subtitle: plan.theme_description || '',
        eventLine: '',
        locationLine: '',
        hostNote: '',
        sections: { schedule: true, menu: true, activities: true, decor: true },
        rawHtml: '',

      };

      const accentPresets = ['#ff6659','#efb13c','#2c7a76','#6b4e8e','#1c1f3d'];

      siteSlot.innerHTML = `

          <h3>Turn it into a page</h3>
          <p class="pp-site-lede">Pick a look, fill in the when/where, then download the file or grab a link to send. Shopping list and budget stay out of the guest-facing page.</p>

          <div class="pp-ai-block">
            <label>✨ Let AI design this page</label>
            <textarea id="pp-ai-instructions" placeholder="Any style notes? e.g. &quot;make it feel like a music festival poster&quot; — leave blank to let it decide."></textarea>
            <div class="pp-ai-row">
              <button class="pp-btn-primary" id="pp-ai-generate-btn">Generate with AI</button>
              <button type="button" class="pp-keys-toggle" id="pp-ai-keys-toggle">using this outside Claude's chat?</button>
            </div>
            <div class="pp-keys-panel" id="pp-ai-keys-panel" style="display:none;">
              <p class="pp-keys-note">This auto-connects to Claude while open inside Claude's chat. Outside chat, paste your own Anthropic API key (console.anthropic.com) — used only in your browser, never saved.</p>
              <div class="pp-key-row"><label for="pp-ai-key">Claude</label><input type="text" id="pp-ai-key" placeholder="sk-ant-..." autocomplete="off" spellcheck="false"></div>
            </div>
            <div id="pp-ai-status"></div>
          </div>
          <p class="pp-divider">— or design it yourself —</p>

          <div class="pp-site-block">
            <label>Template</label>
            <div class="pp-template-row" id="pp-tpl-row">
              <button type="button" class="pp-template-chip active" data-tpl="program">Program</button>
              <button type="button" class="pp-template-chip" data-tpl="poster">Poster</button>
              <button type="button" class="pp-template-chip" data-tpl="minimal">Minimal</button>
            </div>
          </div>

          <div class="pp-site-block">
            <label>Accent color</label>
            <div class="pp-color-row" id="pp-color-row">
              ${accentPresets.map((c,i)=>`<div class="pp-color-swatch ${i===0?'active':''}" data-color="${c}" style="background:${c}"></div>`).join('')}
              <input type="color" class="pp-color-custom" id="pp-color-custom" value="#ff6659" title="Custom color">
            </div>
          </div>

          <div class="pp-site-block"><label for="pp-site-title">Title</label><input type="text" id="pp-site-title" value="${escapeHtml(state.title)}"></div>
          <div class="pp-site-block"><label for="pp-site-subtitle">Subtitle</label><textarea id="pp-site-subtitle">${escapeHtml(state.subtitle)}</textarea></div>
          <div class="pp-row" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
            <div class="pp-site-block"><label for="pp-site-when">When</label><input type="text" id="pp-site-when" placeholder="Sat, Sept 12 · 6pm"></div>
            <div class="pp-site-block"><label for="pp-site-where">Where</label><input type="text" id="pp-site-where" placeholder="123 Maple St, or a map link"></div>
          </div>
          <div class="pp-site-block"><label for="pp-site-rsvp">RSVP / host note</label><textarea id="pp-site-rsvp" placeholder="Text Jamie by the 5th, or bring nothing but yourself."></textarea></div>

          <div class="pp-site-block">
            <label>Sections to include</label>
            <div class="pp-section-toggles" id="pp-section-toggles">
              <button type="button" class="pp-chip active" data-sec="schedule">Schedule</button>
              <button type="button" class="pp-chip active" data-sec="menu">Menu</button>
              <button type="button" class="pp-chip active" data-sec="activities">Activities</button>
              <button type="button" class="pp-chip active" data-sec="decor">What to expect</button>
            </div>
          </div>

          <label class="pp-raw-check"><input type="checkbox" id="pp-raw-check"> Edit the raw HTML directly (for full custom design)</label>
          <textarea class="pp-raw-textarea" id="pp-raw-textarea" style="display:none;"></textarea>

          <iframe class="pp-preview-frame" id="pp-preview-frame"></iframe>

          <div class="pp-site-actions">
            <button class="pp-btn-primary" id="pp-download-btn">Download HTML file</button>
            <button class="pp-btn-secondary" id="pp-share-toggle-btn">Get a shareable link</button>
          </div>

          <div id="pp-share-panel" style="display:none;">
            <div class="pp-share-row">
              <input type="text" id="pp-share-slug" value="${escapeHtml(slugify(state.title))}">
              <button class="pp-btn-primary" id="pp-share-save-btn">Save link</button>
            </div>
            <div id="pp-share-output"></div>
            <p class="pp-share-note">This creates a real link, but it only opens for other people once you've published this artifact using Claude's share/publish option — otherwise it only works in your own browser. Anyone with the link can view the page; don't put anything private in it.</p>
          </div>
        </div>
      `;

      siteSlot.scrollIntoView({behavior:'smooth', block:'start'});

      const preview = document.getElementById('pp-preview-frame');
      const rawCheck = document.getElementById('pp-raw-check');
      const rawTextarea = document.getElementById('pp-raw-textarea');

      function currentDoc(){
        return generateSiteDocument(state, plan);
      }
      function refreshPreview(){
        if(!state.rawDirty){ state.rawHtml = currentDoc(); rawTextarea.value = state.rawHtml; }
        preview.srcdoc = rawCheck.checked ? rawTextarea.value : currentDoc();
      }

      document.getElementById('pp-tpl-row').addEventListener('click', (e) => {
        const btn = e.target.closest('.pp-template-chip'); if(!btn) return;
        document.querySelectorAll('#pp-tpl-row .pp-template-chip').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        state.template = btn.dataset.tpl;
        refreshPreview();
      });

      document.getElementById('pp-color-row').addEventListener('click', (e) => {
        const sw = e.target.closest('.pp-color-swatch'); if(!sw) return;
        document.querySelectorAll('.pp-color-swatch').forEach(s=>s.classList.remove('active'));
        sw.classList.add('active');
        state.accent = sw.dataset.color;
        document.getElementById('pp-color-custom').value = state.accent;
        refreshPreview();
      });
      document.getElementById('pp-color-custom').addEventListener('input', (e) => {
        document.querySelectorAll('.pp-color-swatch').forEach(s=>s.classList.remove('active'));
        state.accent = e.target.value;
        refreshPreview();
      });

      document.getElementById('pp-site-title').addEventListener('input', e => { state.title = e.target.value; refreshPreview(); });
      document.getElementById('pp-site-subtitle').addEventListener('input', e => { state.subtitle = e.target.value; refreshPreview(); });
      document.getElementById('pp-site-when').addEventListener('input', e => { state.eventLine = e.target.value; refreshPreview(); });
      document.getElementById('pp-site-where').addEventListener('input', e => { state.locationLine = e.target.value; refreshPreview(); });
      document.getElementById('pp-site-rsvp').addEventListener('input', e => { state.hostNote = e.target.value; refreshPreview(); });

      document.getElementById('pp-section-toggles').addEventListener('click', e => {
        const btn = e.target.closest('.pp-chip'); if(!btn) return;
        btn.classList.toggle('active');
        state.sections[btn.dataset.sec] = btn.classList.contains('active');
        refreshPreview();
      });

      rawCheck.addEventListener('change', () => {
        rawTextarea.style.display = rawCheck.checked ? 'block' : 'none';
        if(rawCheck.checked){ rawTextarea.value = currentDoc(); }
        refreshPreview();
      });
      rawTextarea.addEventListener('input', () => {
        state.rawDirty = true;
        state.rawHtml = rawTextarea.value;
        preview.srcdoc = rawTextarea.value;
      });

      const aiKeysToggle = document.getElementById('pp-ai-keys-toggle');
      const aiKeysPanel = document.getElementById('pp-ai-keys-panel');
      aiKeysToggle.addEventListener('click', () => {
        aiKeysPanel.style.display = aiKeysPanel.style.display === 'none' ? 'block' : 'none';
      });

      function timeoutAfter(ms){
        return new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), ms));
      }

      document.getElementById('pp-ai-generate-btn').addEventListener('click', async () => {
        const btn = document.getElementById('pp-ai-generate-btn');
        const statusEl = document.getElementById('pp-ai-status');
        const instructions = document.getElementById('pp-ai-instructions').value.trim();
        const userKey = document.getElementById('pp-ai-key').value.trim();

        btn.disabled = true;
        statusEl.className = 'pp-ai-status';
        statusEl.textContent = 'Designing the page…';

        const briefParts = [
          `Event title: ${state.title || plan.theme_name}`,
          `Theme: ${plan.theme_description || ''}`,
          state.eventLine ? `When: ${state.eventLine}` : null,
          state.locationLine ? `Where: ${state.locationLine}` : null,
          state.hostNote ? `RSVP / host note: ${state.hostNote}` : null,
          plan.menu && plan.menu.length ? `Menu: ${plan.menu.map(c => c.category + ' — ' + (c.items||[]).join(', ')).join(' | ')}` : null,
          plan.activities && plan.activities.length ? `Activities: ${plan.activities.join(', ')}` : null,
          plan.decor && plan.decor.length ? `Decor notes: ${plan.decor.join(', ')}` : null,
          plan.timeline && plan.timeline.length ? `Schedule: ${plan.timeline.map(t => t.time + ' — ' + t.event).join(' | ')}` : null,
          instructions ? `Extra style direction from the host: ${instructions}` : null,
        ].filter(Boolean).join('\n');

        const systemPrompt = `You design single-page HTML party invitation websites. Respond with ONLY a complete, self-contained HTML document — starting with <!DOCTYPE html> and ending with </html> — no markdown fences, no commentary before or after. Inline all CSS in a <style> tag in the head; do not reference external files or scripts. Design a genuinely attractive, on-theme guest-facing invite page using the details given: a hero section with the title/theme, a when/where block if given, sections for schedule/menu/activities/decor as relevant, and an RSVP section if a host note was given. Do not include budget or shopping list information — this page is for guests, not the host. Make real, considered visual design choices (typography, color, layout) that suit the theme rather than a generic template. The page must render correctly as a standalone file with no network dependencies other than optionally a Google Fonts @import.`;

        try {
          const headers = { "Content-Type": "application/json" };
          if(userKey){
            headers["x-api-key"] = userKey;
            headers["anthropic-version"] = "2023-06-01";
            headers["anthropic-dangerous-direct-browser-access"] = "true";
          }
          const response = await Promise.race([
            fetch("https://api.anthropic.com/v1/messages", {
              method: "POST", headers,
              body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 4000, system: systemPrompt, messages: [{ role: "user", content: briefParts }] })
            }),
            timeoutAfter(30000)
          ]);
          if(!response.ok){
            const bodyText = await response.text().catch(()=> '');
            throw new Error("Request failed (" + response.status + "). " + bodyText.slice(0,200));
          }
          const data = await response.json();
          const textBlock = (data.content || []).find(b => b.type === 'text');
          if(!textBlock) throw new Error("No page came back.");
          let html = textBlock.text.trim().replace(/^```html/i, '').replace(/^```/, '').replace(/```$/, '').trim();

          state.rawDirty = true;
          state.rawHtml = html;
          rawCheck.checked = true;
          rawTextarea.style.display = 'block';
          rawTextarea.value = html;
          preview.srcdoc = html;

          statusEl.textContent = 'Done — edit the HTML below if you want to tweak anything.';
        } catch(err){
          console.error(err);
          statusEl.className = 'pp-ai-status pp-ai-error';
          if(err.message === 'timeout'){
            statusEl.textContent = "That took over 30 seconds with no response — try again, or design it manually below.";
          } else if(!userKey){
            statusEl.textContent = "Couldn't reach Claude (" + err.message + "). If you're outside Claude's chat, add an API key above — otherwise, design it manually below.";
          } else {
            statusEl.textContent = "Couldn't reach Claude (" + err.message + "). Double-check the API key, or design it manually below.";
          }
        } finally {
          btn.disabled = false;
        }
      });

      document.getElementById('pp-download-btn').addEventListener('click', () => {
        const html = rawCheck.checked ? rawTextarea.value : currentDoc();
        const blob = new Blob([html], {type:'text/html'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = slugify(state.title) + '.html';
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);
      });

      const sharePanel = document.getElementById('pp-share-panel');
      document.getElementById('pp-share-toggle-btn').addEventListener('click', () => {
        sharePanel.style.display = sharePanel.style.display === 'none' ? 'block' : 'none';
      });

      document.getElementById('pp-share-save-btn').addEventListener('click', async () => {
        const slugInput = document.getElementById('pp-share-slug');
        const code = slugify(slugInput.value);
        slugInput.value = code;
        const outputEl = document.getElementById('pp-share-output');
        outputEl.innerHTML = `<p class="pp-share-note">Saving…</p>`;
        try {
          let taken = false;
          try {
            const existing = await window.storage.get('event:' + code, true);
            taken = !!existing;
          } catch(e){ taken = false; }

          if(taken){
            outputEl.innerHTML = `<p class="pp-share-warn">That link is already taken. <button class="pp-btn-secondary" id="pp-share-overwrite">Use it anyway</button> or try a different one.</p>`;
            document.getElementById('pp-share-overwrite').addEventListener('click', async () => {
              await saveShare(code, outputEl);
            });
            return;
          }
          await saveShare(code, outputEl);
        } catch(err){
          outputEl.innerHTML = `<p class="pp-share-warn">Couldn't save that link right now. Try again in a moment.</p>`;
        }
      });

      async function saveShare(code, outputEl){
        const homeUrl = location.origin + location.pathname + location.search;
        const payload = {
          template: state.template, accent: state.accent, title: state.title, subtitle: state.subtitle,
          eventLine: state.eventLine, locationLine: state.locationLine, hostNote: state.hostNote,
          sections: state.sections, plan: plan,
          rawHtml: rawCheck.checked ? rawTextarea.value : '',
          homeUrl: homeUrl,
        };
        await window.storage.set('event:' + code, JSON.stringify(payload), true);
        const link = homeUrl + '#event=' + encodeURIComponent(code);
        outputEl.innerHTML = `<div class="pp-share-link-box" id="pp-share-link-text">${escapeHtml(link)}</div>
          <button class="pp-btn-secondary" id="pp-copy-link-btn" style="margin-top:8px;">Copy link</button>`;
        document.getElementById('pp-copy-link-btn').addEventListener('click', () => {
          navigator.clipboard.writeText(link).then(() => {
            const b = document.getElementById('pp-copy-link-btn');
            b.textContent = 'Copied!'; setTimeout(()=>{ b.textContent = 'Copy link'; }, 1600);
          });
        });
      }

      refreshPreview();
    }

    function generatePlan(){
      clearError();
      resultSlot.innerHTML=''; siteSlot.innerHTML='';

      const occasion = document.getElementById('pp-occasion').value.trim();
      const guests = document.getElementById('pp-guests').value.trim();
      const budget = document.getElementById('pp-budget').value.trim();
      const notes = document.getElementById('pp-notes').value.trim();
      const location = document.querySelector('#pp-location-chips .pp-chip.active');
      const vibes = Array.from(document.querySelectorAll('#pp-vibe-chips .pp-chip.active')).map(c => c.dataset.value);

      if(!occasion){ showError("Add an occasion so the plan has something to build around."); return; }

      setLoading(true);
      setTimeout(() => {
        try {
          const plan = buildLocalPlan({ occasion, guests, budget, notes, location: location ? location.dataset.value : '', vibes });
          renderPlan(plan);
        } catch(err){
          console.error(err);
          showError("Something went wrong putting the plan together. Try again.");
        } finally {
          setLoading(false);
        }
      }, 450);
    }

    submitBtn.addEventListener('click', generatePlan);
  }

  const hashMatch = location.hash.match(/^#event=(.+)$/);
  try {
    if(hashMatch){
      renderSharedSite(decodeURIComponent(hashMatch[1]));
    } else {
      initPlanner();
    }
  } catch(err){
    console.error(err);
    showFatalError(err.message || String(err));
  }
})();
</script>
