<style>
  :root{
    --ink:#1c1f3d;
    --ink-soft:#3a3f6b;
    --paper:#fbf6ec;
    --paper-dim:#f1ead9;
    --coral:#ff6659;
    --gold:#efb13c;
    --teal:#2c7a76;
    --line: rgba(28,31,61,0.14);
    --shadow: 0 18px 40px rgba(28,31,61,0.35);
    --font-display: 'Fraunces', Georgia, serif;
    --font-body: 'Sora', 'Inter', system-ui, sans-serif;
    --font-mono: 'IBM Plex Mono', 'Courier New', monospace;
  }

  * { box-sizing: border-box; }

  #pp-root{
    font-family: var(--font-body);
    background: var(--ink);
    background-image:
      radial-gradient(circle at 15% 10%, rgba(255,102,89,0.18), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(44,122,118,0.25), transparent 45%);
    color: var(--paper);
    padding: 28px 16px 60px;
    border-radius: 18px;
    min-height: 100%;
  }

<body>


<div id="pp-root">
  <div class="pp-wrap" id="pp-planner-wrap">

      <div class="pp-field">

          <button type="button" class="pp-chip" data-value="Home / indoor">Home / indoor</button>
          <button type="button" class="pp-chip" data-value="Rented venue">Rented venue</button>
          <button type="button" class="pp-chip" data-value="Restaurant or bar">Restaurant or bar</button>
        </div>
      </div>
      <div class="pp-field">
        <label>Set the vibe (pick a few)</label>
        <div class="pp-chip-group" id="pp-vibe-chips">
          <button type="button" class="pp-chip" data-value="Elegant">Elegant</button>
          <button type="button" class="pp-chip" data-value="Laid-back">Laid-back</button>
          <button type="button" class="pp-chip" data-value="Bold & colorful">Bold & colorful</button>
          <button type="button" class="pp-chip" data-value="Cozy">Cozy</button>
          <button type="button" class="pp-chip" data-value="Retro">Retro</button>

      <div id="pp-loading-slot"></div>

    <div id="pp-site-slot"></div>

</div>

<script>
(function(){
  function showFatalError(msg){
    const root = document.getElementById('pp-root');
    if(!root) return;
    let bar = document.getElementById('pp-fatal-error');
    if(!bar){
      bar = document.createElement('div');
      bar.id = 'pp-fatal-error';
      bar.style.cssText = 'background:#fbe3e0;color:#9c2b23;font-family:monospace;font-size:12px;padding:12px 16px;border-radius:8px;margin-bottom:16px;max-width:760px;';
      root.prepend(bar);
    }
    bar.textContent = 'Something broke: ' + msg;
  }
  window.addEventListener('error', (e) => showFatalError(e.message || 'unknown error'));
  window.addEventListener('unhandledrejection', (e) => showFatalError((e.reason && e.reason.message) || String(e.reason)));

  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str == null ? '' : String(str);
    return d.innerHTML;
  }
  function slugify(s){
    return (s||'').toLowerCase().trim().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'').slice(0,40) || 'party';
  }

  /* ================= LOCAL PLAN GENERATOR (no API, no network) ================= */

  function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
  function pickN(arr, n){
    const pool = arr.slice();
    const out = [];
    while(pool.length && out.length < n){
      out.push(pool.splice(Math.floor(Math.random()*pool.length), 1)[0]);
    }
    return out;

  function detectOccasionKey(occasionLower){
    const keys = Object.keys(OCCASION_ACTIVITIES).filter(k => k !== 'default');
    for(const k of keys){ if(occasionLower.includes(k)) return k; }
    if(occasionLower.includes('birthday') || /\b\d{1,3}(st|nd|rd|th)\b/.test(occasionLower)) return 'birthday';
    return 'default';
  }

  function detectDietaryNote(notesLower){
    const tags = [];
    if(notesLower.includes('vegan')) tags.push('vegan-friendly option at every station');
    if(notesLower.includes('vegetarian')) tags.push('vegetarian option at every station');
    if(notesLower.includes('gluten')) tags.push('gluten-free option clearly labeled');
    if(notesLower.includes('nut')) tags.push('nut-free prep for shared dishes');
    if(notesLower.includes('dairy')) tags.push('dairy-free option available');
    if(notesLower.includes('halal')) tags.push('halal option available');
    if(notesLower.includes('kosher')) tags.push('kosher option available');
    return tags;
  }

  function buildLocalPlan({ occasion, guests, budget, notes, location, vibes }){
    const occasionLower = occasion.toLowerCase();
    const notesLower = notes.toLowerCase();
    const primaryVibe = vibes[0] || null;
    const words = VIBE_WORDS[primaryVibe] || DEFAULT_WORDS;
    const occasionKey = detectOccasionKey(occasionLower);
    const guestsNum = parseInt(guests, 10);

    const themeName = `${pick(words.adj)} ${pick(words.noun)}`;
    const guestPhrase = guestsNum ? `${guestsNum} guests` : 'your guests';
    const vibePhrase = vibes.length ? vibes.join(' meets ').toLowerCase() : 'warm and welcoming';
    const locPhrase = location ? location.toLowerCase() : 'wherever you\'re hosting';
    const themeDescription = `A ${vibePhrase} take on ${occasion.toLowerCase()}, built for ${guestPhrase} ${locPhrase.startsWith('backyard') || locPhrase.startsWith('home') ? 'at ' + locPhrase : 'at your ' + locPhrase}.`;

    const palette = PALETTES[primaryVibe] || PALETTES['default'];

    const dietaryTags = detectDietaryNote(notesLower);
    const bites = pickN(BITES[primaryVibe] || BITES['default'], 4);
    const drinks = pickN(DRINKS[primaryVibe] || DRINKS['default'], 3);
    const sweets = pickN(SWEETS[primaryVibe] || SWEETS['default'], 2);
    if(dietaryTags.length){ bites.push('Every station includes a ' + dietaryTags.join(' and ')); }

    const menu = [
      { category: 'Bites', items: bites },
      { category: 'Drinks', items: drinks },
      { category: 'Sweets', items: sweets },
    ];

    const decor = pickN(DECOR[primaryVibe] || DECOR['default'], 4);

    const activityPool = (OCCASION_ACTIVITIES[occasionKey] || OCCASION_ACTIVITIES['default'])
      .concat(vibes.flatMap(v => VIBE_ACTIVITIES[v] || []));
    const activities = pickN(activityPool, Math.min(4, activityPool.length));

    const centerpieceMoment = activities[0] || 'A group toast';
    const secondActivity = activities[1] || 'Open mingling time';
    const timeline = [
      { time: 'Arrival', event: 'Guests arrive — drinks and bites are out, welcome music is playing' },
      { time: '+20 min', event: 'Everyone\'s settled in — kick things off with ' + centerpieceMoment.toLowerCase() },
      { time: '+45 min', event: 'Main food stations open' },
      { time: '+1 hr 15 min', event: secondActivity },
      { time: '+1 hr 45 min', event: 'Dessert & sweets table opens' },
      { time: '+2 hr 15 min', event: 'Music shifts to a wind-down playlist, thank-yous begin' },
    ];

    const shopping = [
      'Plates, napkins & cups' + (guestsNum ? ` (for ${guestsNum})` : ''),
      'Serving trays & utensils',
      'Tablecloths',
      'Ice & a cooler',
      'Trash bags & a spare bin',
      'String lights or candles',
      ...decor.slice(0,2).map(d => d.split(' — ')[0]),
      ...bites.slice(0,2),
      ...drinks.slice(0,1),
      sweets[0] || 'Celebration cake',
    ].filter((v,i,arr) => arr.indexOf(v) === i).slice(0, 12);

    let budgetBreakdown = [];
    let budgetTotal = budget || '';
    const budgetNum = budget ? parseFloat(budget.replace(/[^0-9.]/g, '')) : NaN;
    if(!isNaN(budgetNum) && budgetNum > 0){
      const splits = [
        { item: 'Food & drink', pct: 0.40 },
        { item: 'Decor', pct: 0.20 },
        { item: 'Activities & entertainment', pct: 0.15 },
        { item: 'Rentals & supplies', pct: 0.15 },
        { item: 'Buffer / misc', pct: 0.10 },
      ];
      budgetBreakdown = splits.map(s => ({ item: s.item, estimate: '$' + Math.round(budgetNum * s.pct) }));
      budgetTotal = '$' + Math.round(budgetNum);
    } else {
      budgetBreakdown = [
        { item: 'Food & drink', estimate: '~40%' },
        { item: 'Decor', estimate: '~20%' },
        { item: 'Activities & entertainment', estimate: '~15%' },
        { item: 'Rentals & supplies', estimate: '~15%' },
        { item: 'Buffer / misc', estimate: '~10%' },
      ];
      budgetTotal = 'Set a number above for exact dollar amounts';
    }

    return {
      theme_name: themeName,
      theme_description: themeDescription,
      color_palette: palette,
      menu,
      decor,
      activities,
      timeline,
      shopping_list: shopping,
      budget_breakdown: budgetBreakdown,
      budget_total: budgetTotal,
    };
  }

  /* ================= URL-EMBEDDED SHARING (no backend, no Claude storage) ================= */

  function bytesToB64Url(bytes){
    let binary = '';
    for(let i=0;i<bytes.length;i++) binary += String.fromCharCode(bytes[i]);
    return btoa(binary).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
  }
  function b64UrlToBytes(b64url){
    const b64 = b64url.replace(/-/g,'+').replace(/_/g,'/');
    const padded = b64 + '='.repeat((4 - b64.length % 4) % 4);
    const binary = atob(padded);
    const bytes = new Uint8Array(binary.length);
    for(let i=0;i<binary.length;i++) bytes[i] = binary.charCodeAt(i);
    return bytes;
  }
  async function compressToUrlSafe(str){
    const bytes = new TextEncoder().encode(str);
    try {
      const cs = new CompressionStream('gzip');
      const writer = cs.writable.getWriter();
      writer.write(bytes); writer.close();
      const compressed = new Uint8Array(await new Response(cs.readable).arrayBuffer());
      return 'g' + bytesToB64Url(compressed);
    } catch(e){
      return 'r' + bytesToB64Url(bytes);
    }
  }
  async function decompressFromUrlSafe(data){
    const marker = data[0];
    const bytes = b64UrlToBytes(data.slice(1));
    if(marker === 'g'){
      const ds = new DecompressionStream('gzip');
      const writer = ds.writable.getWriter();
      writer.write(bytes); writer.close();
      const buf = await new Response(ds.readable).arrayBuffer();
      return new TextDecoder().decode(buf);
    }
    return new TextDecoder().decode(bytes);
  }

  /* ================= SHARED VIEW (when opened via #p=<compressed page data>) ================= */

  async function renderSharedSite(data){
    const root = document.getElementById('pp-root');
    root.classList.add('pp-shared-mode');
    root.innerHTML = `<div class="pp-shared-status">Loading party page…</div>`;
    const homeUrl = location.origin + location.pathname + location.search;
    try {
      const html = await decompressFromUrlSafe(data);
      root.innerHTML = `
        <div class="pp-shared-bar"><span>YoPlanner page</span><a href="${homeUrl}" target="_top">make your own →</a></div>
        <iframe class="pp-shared-frame" id="pp-shared-frame" sandbox="allow-same-origin"></iframe>
      `;
      document.getElementById('pp-shared-frame').srcdoc = html;
    } catch(err){
      console.error(err);
      root.innerHTML = `
        <div class="pp-shared-bar"><span>YoPlanner page</span><a href="${homeUrl}" target="_top">make your own →</a></div>
        <div class="pp-shared-status">This link looks broken or got cut off somewhere along the way. Ask for a fresh one.</div>
      `;
    }
  }

  function initPlanner(){
    const locationChips = document.querySelectorAll('#pp-location-chips .pp-chip');
    const vibeChips = document.querySelectorAll('#pp-vibe-chips .pp-chip');
    locationChips.forEach(chip => chip.addEventListener('click', () => {
      locationChips.forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
    }));
    vibeChips.forEach(chip => chip.addEventListener('click', () => chip.classList.toggle('active')));

    const submitBtn = document.getElementById('pp-submit');
    const errorSlot = document.getElementById('pp-error-slot');
    const loadingSlot = document.getElementById('pp-loading-slot');
    const resultSlot = document.getElementById('pp-result-slot');
    const siteSlot = document.getElementById('pp-site-slot');

    const loadingMessages = ['Sketching a theme...', 'Setting the menu...', 'Building the timeline...', 'Wrapping up the shopping list...'];
    function setLoading(isLoading){
      submitBtn.disabled = isLoading;
      if(isLoading){
        let i = 0;
        loadingSlot.innerHTML = `<div class="pp-loading"><span class="pp-spinner"></span><span id="pp-loading-text">${loadingMessages[0]}</span></div>`;
        loadingSlot._interval = setInterval(() => {
          i = (i+1) % loadingMessages.length;
          const t = document.getElementById('pp-loading-text');
          if(t) t.textContent = loadingMessages[i];
        }, 1600);
      } else {
        clearInterval(loadingSlot._interval);
        loadingSlot.innerHTML = '';
      }
    }
    function showError(msg){ errorSlot.innerHTML = `<div class="pp-error">${msg}</div>`; }
    function clearError(){ errorSlot.innerHTML = ''; }

    function planHtml(plan){
      const palette = (plan.color_palette || []).map(hex =>
        `<div class="pp-swatch" style="background:${escapeHtml(hex)}" title="${escapeHtml(hex)}"></div>`).join('');

      const activities = `<div class="pp-ticket"><div class="pp-ticket-head"><span class="pp-ticket-num">A</span><span class="pp-ticket-title">Activities & games</span></div><div class="pp-ticket-body"><ul class="pp-list">${(plan.activities||[]).map(i => `<li>${escapeHtml(i)}</li>`).join('')}</ul></div></div>`;

      const shopping = `<div class="pp-ticket"><div class="pp-ticket-head"><span class="pp-ticket-num">S</span><span class="pp-ticket-title">Shopping list</span></div><div class="pp-ticket-body"><ul class="pp-list">${(plan.shopping_list||[]).map(i => `<li>${escapeHtml(i)}</li>`).join('')}</ul></div></div>`;

      const budget = `<div class="pp-ticket"><div class="pp-ticket-head"><span class="pp-ticket-num">$</span><span class="pp-ticket-title">Budget breakdown</span></div><div class="pp-ticket-body">${budgetRows}${plan.budget_total ? `<div class="pp-budget-total"><span>Total</span><span>${escapeHtml(plan.budget_total)}</span></div>` : ''}</div></div>`;

        rawHtml: '',
        rawDirty: false,
      };

      const accentPresets = ['#ff6659','#efb13c','#2c7a76','#6b4e8e','#1c1f3d'];

      siteSlot.innerHTML = `
        <div class="pp-site-panel">
          <h3>Turn it into a page</h3>
          <p class="pp-site-lede">Pick a look, fill in the when/where, then download the file or grab a link to send. Shopping list and budget stay out of the guest-facing page.</p>

          <div class="pp-ai-block">
            <label>✨ Let AI design this page</label>
            <textarea id="pp-ai-instructions" placeholder="Any style notes? e.g. &quot;make it feel like a music festival poster&quot; — leave blank to let it decide."></textarea>
            <div class="pp-ai-row">
              <button class="pp-btn-primary" id="pp-ai-generate-btn">Generate with AI</button>
              <button type="button" class="pp-keys-toggle" id="pp-ai-keys-toggle">using this outside Claude's chat?</button>
            </div>
            <div class="pp-keys-panel" id="pp-ai-keys-panel" style="display:none;">
              <p class="pp-keys-note">This auto-connects to Claude while open inside Claude's chat. Outside chat, paste your own Anthropic API key (console.anthropic.com) — used only in your browser, never saved.</p>
              <div class="pp-key-row"><label for="pp-ai-key">Claude</label><input type="text" id="pp-ai-key" placeholder="sk-ant-..." autocomplete="off" spellcheck="false"></div>
            </div>
            <div id="pp-ai-status"></div>
          </div>
          <p class="pp-divider">— or design it yourself —</p>

          <div class="pp-site-block">
            <label>Template</label>
            <div class="pp-template-row" id="pp-tpl-row">
              <button type="button" class="pp-template-chip active" data-tpl="program">Program</button>
              <button type="button" class="pp-template-chip" data-tpl="poster">Poster</button>
              <button type="button" class="pp-template-chip" data-tpl="minimal">Minimal</button>
            </div>
          </div>

          <div class="pp-site-block">
            <label>Accent color</label>
            <div class="pp-color-row" id="pp-color-row">
              ${accentPresets.map((c,i)=>`<div class="pp-color-swatch ${i===0?'active':''}" data-color="${c}" style="background:${c}"></div>`).join('')}
              <input type="color" class="pp-color-custom" id="pp-color-custom" value="#ff6659" title="Custom color">
            </div>
          </div>

          <div class="pp-site-block"><label for="pp-site-title">Title</label><input type="text" id="pp-site-title" value="${escapeHtml(state.title)}"></div>
          <div class="pp-site-block"><label for="pp-site-subtitle">Subtitle</label><textarea id="pp-site-subtitle">${escapeHtml(state.subtitle)}</textarea></div>
          <div class="pp-row" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
            <div class="pp-site-block"><label for="pp-site-when">When</label><input type="text" id="pp-site-when" placeholder="Sat, Sept 12 · 6pm"></div>
            <div class="pp-site-block"><label for="pp-site-where">Where</label><input type="text" id="pp-site-where" placeholder="123 Maple St, or a map link"></div>
          </div>
          <div class="pp-site-block"><label for="pp-site-rsvp">RSVP / host note</label><textarea id="pp-site-rsvp" placeholder="Text Jamie by the 5th, or bring nothing but yourself."></textarea></div>

          <div class="pp-site-block">
            <label>Sections to include</label>
            <div class="pp-section-toggles" id="pp-section-toggles">
              <button type="button" class="pp-chip active" data-sec="schedule">Schedule</button>
              <button type="button" class="pp-chip active" data-sec="menu">Menu</button>
              <button type="button" class="pp-chip active" data-sec="activities">Activities</button>
              <button type="button" class="pp-chip active" data-sec="decor">What to expect</button>
            </div>
          </div>

          <label class="pp-raw-check"><input type="checkbox" id="pp-raw-check"> Edit the raw HTML directly (for full custom design)</label>
          <textarea class="pp-raw-textarea" id="pp-raw-textarea" style="display:none;"></textarea>

          <iframe class="pp-preview-frame" id="pp-preview-frame"></iframe>

          <div class="pp-site-actions">
            <button class="pp-btn-primary" id="pp-download-btn">Download HTML file</button>
            <button class="pp-btn-secondary" id="pp-share-toggle-btn">Get a shareable link</button>
          </div>

          <div id="pp-share-panel" style="display:none;">
            <div id="pp-share-output"></div>
            <p class="pp-share-note">This packs the whole page into the link itself — no server, no publish step, no dependency on Claude. It'll work anywhere this file is hosted (GitHub Pages included), or even opened straight from your own computer. The link is long since it's carrying the whole page — that's normal, it'll still work fine pasted into email, iMessage, WhatsApp, etc.</p>
          </div>
        </div>
      `;

      siteSlot.scrollIntoView({behavior:'smooth', block:'start'});

      const preview = document.getElementById('pp-preview-frame');
      const rawCheck = document.getElementById('pp-raw-check');
      const rawTextarea = document.getElementById('pp-raw-textarea');

      function currentDoc(){
        return generateSiteDocument(state, plan);
      }
      function refreshPreview(){
        if(!state.rawDirty){ state.rawHtml = currentDoc(); rawTextarea.value = state.rawHtml; }
        preview.srcdoc = rawCheck.checked ? rawTextarea.value : currentDoc();
      }

      document.getElementById('pp-tpl-row').addEventListener('click', (e) => {
        const btn = e.target.closest('.pp-template-chip'); if(!btn) return;
        document.querySelectorAll('#pp-tpl-row .pp-template-chip').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        state.template = btn.dataset.tpl;
        refreshPreview();
      });

      document.getElementById('pp-color-row').addEventListener('click', (e) => {
        const sw = e.target.closest('.pp-color-swatch'); if(!sw) return;
        document.querySelectorAll('.pp-color-swatch').forEach(s=>s.classList.remove('active'));
        sw.classList.add('active');
        state.accent = sw.dataset.color;
        document.getElementById('pp-color-custom').value = state.accent;
        refreshPreview();
      });
      document.getElementById('pp-color-custom').addEventListener('input', (e) => {
        document.querySelectorAll('.pp-color-swatch').forEach(s=>s.classList.remove('active'));
        state.accent = e.target.value;
        refreshPreview();
      });

      document.getElementById('pp-site-title').addEventListener('input', e => { state.title = e.target.value; refreshPreview(); });
      document.getElementById('pp-site-subtitle').addEventListener('input', e => { state.subtitle = e.target.value; refreshPreview(); });
      document.getElementById('pp-site-when').addEventListener('input', e => { state.eventLine = e.target.value; refreshPreview(); });
      document.getElementById('pp-site-where').addEventListener('input', e => { state.locationLine = e.target.value; refreshPreview(); });
      document.getElementById('pp-site-rsvp').addEventListener('input', e => { state.hostNote = e.target.value; refreshPreview(); });

      document.getElementById('pp-section-toggles').addEventListener('click', e => {
        const btn = e.target.closest('.pp-chip'); if(!btn) return;
        btn.classList.toggle('active');
        state.sections[btn.dataset.sec] = btn.classList.contains('active');
        refreshPreview();
      });

      rawCheck.addEventListener('change', () => {
        rawTextarea.style.display = rawCheck.checked ? 'block' : 'none';
        if(rawCheck.checked){ rawTextarea.value = currentDoc(); }
        refreshPreview();
      });
      rawTextarea.addEventListener('input', () => {
        state.rawDirty = true;
        state.rawHtml = rawTextarea.value;
        preview.srcdoc = rawTextarea.value;
      });

      const aiKeysToggle = document.getElementById('pp-ai-keys-toggle');
      const aiKeysPanel = document.getElementById('pp-ai-keys-panel');
      aiKeysToggle.addEventListener('click', () => {
        aiKeysPanel.style.display = aiKeysPanel.style.display === 'none' ? 'block' : 'none';
      });

      function timeoutAfter(ms){
        return new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), ms));
      }

      document.getElementById('pp-ai-generate-btn').addEventListener('click', async () => {
        const btn = document.getElementById('pp-ai-generate-btn');
        const statusEl = document.getElementById('pp-ai-status');
        const instructions = document.getElementById('pp-ai-instructions').value.trim();
        const userKey = document.getElementById('pp-ai-key').value.trim();

        btn.disabled = true;
        statusEl.className = 'pp-ai-status';
        statusEl.textContent = 'Designing the page…';

        const briefParts = [
          `Event title: ${state.title || plan.theme_name}`,
          `Theme: ${plan.theme_description || ''}`,
          state.eventLine ? `When: ${state.eventLine}` : null,
          state.locationLine ? `Where: ${state.locationLine}` : null,
          state.hostNote ? `RSVP / host note: ${state.hostNote}` : null,
          plan.menu && plan.menu.length ? `Menu: ${plan.menu.map(c => c.category + ' — ' + (c.items||[]).join(', ')).join(' | ')}` : null,
          plan.activities && plan.activities.length ? `Activities: ${plan.activities.join(', ')}` : null,
          plan.decor && plan.decor.length ? `Decor notes: ${plan.decor.join(', ')}` : null,
          plan.timeline && plan.timeline.length ? `Schedule: ${plan.timeline.map(t => t.time + ' — ' + t.event).join(' | ')}` : null,
          instructions ? `Extra style direction from the host: ${instructions}` : null,
        ].filter(Boolean).join('\n');

        const systemPrompt = `You design single-page HTML party invitation websites. Respond with ONLY a complete, self-contained HTML document — starting with <!DOCTYPE html> and ending with </html> — no markdown fences, no commentary before or after. Inline all CSS in a <style> tag in the head; do not reference external files or scripts. Design a genuinely attractive, on-theme guest-facing invite page using the details given: a hero section with the title/theme, a when/where block if given, sections for schedule/menu/activities/decor as relevant, and an RSVP section if a host note was given. Do not include budget or shopping list information — this page is for guests, not the host. Make real, considered visual design choices (typography, color, layout) that suit the theme rather than a generic template. The page must render correctly as a standalone file with no network dependencies other than optionally a Google Fonts @import.`;

        try {
          const headers = { "Content-Type": "application/json" };
          if(userKey){
            headers["x-api-key"] = userKey;
            headers["anthropic-version"] = "2023-06-01";
            headers["anthropic-dangerous-direct-browser-access"] = "true";
          }
          const response = await Promise.race([
            fetch("https://api.anthropic.com/v1/messages", {
              method: "POST", headers,
              body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 4000, system: systemPrompt, messages: [{ role: "user", content: briefParts }] })
            }),
            timeoutAfter(30000)
          ]);
          if(!response.ok){
            const bodyText = await response.text().catch(()=> '');
            throw new Error("Request failed (" + response.status + "). " + bodyText.slice(0,200));
          }
          const data = await response.json();
          const textBlock = (data.content || []).find(b => b.type === 'text');
          if(!textBlock) throw new Error("No page came back.");
          let html = textBlock.text.trim().replace(/^```html/i, '').replace(/^```/, '').replace(/```$/, '').trim();

          state.rawDirty = true;
          state.rawHtml = html;
          rawCheck.checked = true;
          rawTextarea.style.display = 'block';
          rawTextarea.value = html;
          preview.srcdoc = html;

          statusEl.textContent = 'Done — edit the HTML below if you want to tweak anything.';
        } catch(err){
          console.error(err);
          statusEl.className = 'pp-ai-status pp-ai-error';
          if(err.message === 'timeout'){
            statusEl.textContent = "That took over 30 seconds with no response — try again, or design it manually below.";
          } else if(!userKey){
            statusEl.textContent = "Couldn't reach Claude (" + err.message + "). If you're outside Claude's chat, add an API key above — otherwise, design it manually below.";
          } else {
            statusEl.textContent = "Couldn't reach Claude (" + err.message + "). Double-check the API key, or design it manually below.";
          }
        } finally {
          btn.disabled = false;
        }
      });

      document.getElementById('pp-download-btn').addEventListener('click', () => {
        const html = rawCheck.checked ? rawTextarea.value : currentDoc();
        const blob = new Blob([html], {type:'text/html'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = slugify(state.title) + '.html';
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);
      });

      const sharePanel = document.getElementById('pp-share-panel');
      document.getElementById('pp-share-toggle-btn').addEventListener('click', async () => {
        const opening = sharePanel.style.display === 'none';
        sharePanel.style.display = opening ? 'block' : 'none';
        if(!opening) return;

        const outputEl = document.getElementById('pp-share-output');
        outputEl.innerHTML = `<p class="pp-share-note">Building the link…</p>`;
        try {
          const homeUrl = location.origin + location.pathname + location.search;
          const html = rawCheck.checked ? rawTextarea.value : currentDoc();
          const packed = await compressToUrlSafe(html);
          const link = homeUrl + '#p=' + packed;
          outputEl.innerHTML = `<div class="pp-share-link-box" id="pp-share-link-text">${escapeHtml(link)}</div>
            <button class="pp-btn-secondary" id="pp-copy-link-btn" style="margin-top:8px;">Copy link</button>`;
          document.getElementById('pp-copy-link-btn').addEventListener('click', () => {
            navigator.clipboard.writeText(link).then(() => {
              const b = document.getElementById('pp-copy-link-btn');
              b.textContent = 'Copied!'; setTimeout(()=>{ b.textContent = 'Copy link'; }, 1600);
            });
          });
        } catch(err){
          console.error(err);
          outputEl.innerHTML = `<p class="pp-share-warn">Couldn't build a link in this browser. Try the download instead.</p>`;
        }
      });

      refreshPreview();
    }

    function generatePlan(){
      clearError();
      resultSlot.innerHTML=''; siteSlot.innerHTML='';

      const occasion = document.getElementById('pp-occasion').value.trim();
      const guests = document.getElementById('pp-guests').value.trim();
      const budget = document.getElementById('pp-budget').value.trim();
      const notes = document.getElementById('pp-notes').value.trim();
      const location = document.querySelector('#pp-location-chips .pp-chip.active');
      const vibes = Array.from(document.querySelectorAll('#pp-vibe-chips .pp-chip.active')).map(c => c.dataset.value);

      if(!occasion){ showError("Add an occasion so the plan has something to build around."); return; }

      setLoading(true);
      setTimeout(() => {
        try {
          const plan = buildLocalPlan({ occasion, guests, budget, notes, location: location ? location.dataset.value : '', vibes });
          renderPlan(plan);
        } catch(err){
          console.error(err);
          showError("Something went wrong putting the plan together. Try again.");
        } finally {
          setLoading(false);
        }
      }, 450);
    }

    submitBtn.addEventListener('click', generatePlan);
  }

  const hashMatch = location.hash.match(/^#p=(.+)$/);
  try {
    if(hashMatch){
      renderSharedSite(decodeURIComponent(hashMatch[1]));
    } else {
      initPlanner();
    }
  } catch(err){
    console.error(err);
    showFatalError(err.message || String(err));
  }
})();
</script>

</body>
</html>
